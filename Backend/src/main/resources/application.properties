# =========================
# Server Configuration
# =========================
server.port=${SERVER_PORT}

# =========================
# Database Configuration
# =========================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=${DATABASE_DRIVER}

# =========================
# JPA / Hibernate
# =========================
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.datasource.hikari.auto-commit=${DB_AUTO_COMMIT}

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}

# =========================
# Logging
# =========================
spring.jpa.show-sql=${SHOW_SQL}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL}

# =========================
# JWT Configuration
# =========================
auth.token.expirationInMils=${AUTH_TOKEN_EXPIRATION_IN_MS}
auth.token.jwtSecret=${AUTH_TOKEN_JWT_SECRET}

# =========================
# Application Configuration
# =========================
app.frontend.url=${APP_FRONTEND_URL}
app.email-verification-token-expiry-minutes=${EMAIL_VERIFICATION_TOKEN_EXPIRY_MINUTES}
app.password-reset-token-expiry-minutes=${PASSWORD_RESET_TOKEN_EXPIRY_MINUTES}

# =========================
# SMTP (Brevo)
# =========================
spring.mail.from=${MAIL_FROM}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${TTLS}
spring.mail.properties.mail.smtp.starttls.required=${TTLS_REQUIRED}
spring.mail.protocol=${MAIL_PROTOCOL}

